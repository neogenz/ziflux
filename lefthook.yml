pre-commit:
  parallel: true
  commands:
    typecheck:
      glob: '**/*.ts'
      run: pnpm typecheck
    lint:
      glob: '**/*.ts'
      run: pnpm lint
    format:
      glob: '**/*.{ts,json,md,yml}'
      run: pnpm format:check
    test:
      glob: '**/*.ts'
      run: pnpm test

pre-push:
  commands:
    full-check:
      run: pnpm typecheck && pnpm lint && pnpm test
